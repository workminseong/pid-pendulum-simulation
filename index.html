<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>PID 제어 알고리즘에 따른 진자의 안정화 비교</title>
  <style>
    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #10131a;
      color: #f2f2f2;
      overflow: hidden;
    }

    header {
      padding: 14px 24px;
      background: #181d28;
      border-bottom: 1px solid #2d3444;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    header span {
      color: #9aa4b8;
      font-size: 14px;
    }

    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 58px);
    }

    .panel {
      background: #151a24;
      border-right: 1px solid #2d3444;
      padding: 18px;
      overflow-y: auto;
    }

    .panel h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    .control-group {
      margin-bottom: 20px;
      padding: 14px;
      background: #1d2330;
      border-radius: 12px;
      border: 1px solid #30384a;
    }

    .control-group h3 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #d6dcff;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      color: #c7cedd;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 5px;
    }

    .value {
      float: right;
      color: #7ee787;
      font-weight: 600;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      background: #334155;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #475569;
    }

    .danger {
      background: #7f1d1d;
    }

    .danger:hover {
      background: #991b1b;
    }

    .blue {
      background: #1d4ed8;
    }

    .blue:hover {
      background: #2563eb;
    }

    .green {
      background: #166534;
    }

    .green:hover {
      background: #15803d;
    }

    .simulation-area {
      display: grid;
      grid-template-rows: 1fr 260px;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #0f172a;
    }

    .info-box {
      font-size: 13px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .legend div {
      background: #111827;
      border: 1px solid #263246;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .gray { background: #94a3b8; }
    .orange { background: #f97316; }
    .cyan { background: #22d3ee; }
    .pink { background: #f472b6; }
  </style>
</head>
<body>
  <header>
    <h1>PID 제어 알고리즘에 따른 진자의 안정화 비교</h1>
    <span>무제어 · P 제어 · PD 제어 · PID 제어 비교 시뮬레이션</span>
  </header>

  <main>
    <aside class="panel">
      <h2>제어 설정</h2>

      <div class="control-group">
        <h3>PID 계수</h3>

        <label>
          Kp 비례 제어
          <span class="value" id="kpValue">35</span>
        </label>
        <input id="kpSlider" type="range" min="0" max="100" step="1" value="35" />

        <label>
          Ki 적분 제어
          <span class="value" id="kiValue">4</span>
        </label>
        <input id="kiSlider" type="range" min="0" max="30" step="0.5" value="4" />

        <label>
          Kd 미분 제어
          <span class="value" id="kdValue">12</span>
        </label>
        <input id="kdSlider" type="range" min="0" max="50" step="0.5" value="12" />
      </div>

      <div class="control-group">
        <h3>시뮬레이션 조건</h3>

        <label>
          초기 각도
          <span class="value" id="angleValue">25°</span>
        </label>
        <input id="angleSlider" type="range" min="-80" max="80" step="1" value="25" />

        <label>
          감쇠 계수
          <span class="value" id="dampingValue">0.12</span>
        </label>
        <input id="dampingSlider" type="range" min="0" max="1" step="0.01" value="0.12" />

        <label>
          외란 세기
          <span class="value" id="disturbValue">3.0</span>
        </label>
        <input id="disturbSlider" type="range" min="0" max="8" step="0.1" value="3" />
      </div>

      <div class="control-group">
        <h3>실행</h3>
        <button class="blue" id="pauseBtn">일시정지</button>
        <button class="green" id="disturbBtn">외란 주기</button>
        <button class="danger" id="resetBtn">초기화</button>
      </div>

      <div class="control-group info-box">
        <h3>해석 기준</h3>
        <p>
          목표 각도는 <b>0°</b>이다. 진자가 목표 각도에 빠르게 도달하고,
          흔들림이 작으며, 다시 안정 상태를 유지할수록 좋은 제어라고 볼 수 있다.
        </p>
        <p>
          P 제어는 빠르게 반응하지만 흔들림이 클 수 있고,
          D 제어는 흔들림을 줄이며,
          I 제어는 남아 있는 오차를 줄이는 역할을 한다.
        </p>

        <div class="legend">
          <div><span class="dot gray"></span>무제어</div>
          <div><span class="dot orange"></span>P 제어</div>
          <div><span class="dot cyan"></span>PD 제어</div>
          <div><span class="dot pink"></span>PID 제어</div>
        </div>
      </div>
    </aside>

    <section class="simulation-area">
      <canvas id="simCanvas"></canvas>
      <canvas id="graphCanvas"></canvas>
    </section>
  </main>

  <script>
    const simCanvas = document.getElementById("simCanvas");
    const graphCanvas = document.getElementById("graphCanvas");
    const ctx = simCanvas.getContext("2d");
    const gctx = graphCanvas.getContext("2d");

    const kpSlider = document.getElementById("kpSlider");
    const kiSlider = document.getElementById("kiSlider");
    const kdSlider = document.getElementById("kdSlider");
    const angleSlider = document.getElementById("angleSlider");
    const dampingSlider = document.getElementById("dampingSlider");
    const disturbSlider = document.getElementById("disturbSlider");

    const kpValue = document.getElementById("kpValue");
    const kiValue = document.getElementById("kiValue");
    const kdValue = document.getElementById("kdValue");
    const angleValue = document.getElementById("angleValue");
    const dampingValue = document.getElementById("dampingValue");
    const disturbValue = document.getElementById("disturbValue");

    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const disturbBtn = document.getElementById("disturbBtn");

    let paused = false;
    let lastTime = performance.now();
    let simTime = 0;

    const G = 9.81;
    const L = 1.4;
    const M = 1.0;
    const MAX_TORQUE = 35;
    const STABLE_THRESHOLD = 2 * Math.PI / 180;

    function resizeCanvas() {
      simCanvas.width = simCanvas.clientWidth * devicePixelRatio;
      simCanvas.height = simCanvas.clientHeight * devicePixelRatio;
      graphCanvas.width = graphCanvas.clientWidth * devicePixelRatio;
      graphCanvas.height = graphCanvas.clientHeight * devicePixelRatio;

      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      gctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    class Pendulum {
      constructor(name, color, type) {
        this.name = name;
        this.color = color;
        this.type = type;
        this.reset();
      }

      reset() {
        this.theta = Number(angleSlider.value) * Math.PI / 180;
        this.omega = 0;
        this.integral = 0;
        this.prevError = 0;
        this.history = [];
        this.maxError = Math.abs(this.theta);
        this.stableTime = null;
        this.stableCounter = 0;
      }

      getGain() {
        const kp = Number(kpSlider.value);
        const ki = Number(kiSlider.value);
        const kd = Number(kdSlider.value);

        if (this.type === "NONE") return { kp: 0, ki: 0, kd: 0 };
        if (this.type === "P") return { kp, ki: 0, kd: 0 };
        if (this.type === "PD") return { kp, ki: 0, kd };
        if (this.type === "PID") return { kp, ki, kd };

        return { kp: 0, ki: 0, kd: 0 };
      }

      update(dt) {
        const damping = Number(dampingSlider.value);

        const target = 0;
        const error = target - this.theta;
        this.integral += error * dt;

        // 적분항이 지나치게 커지는 것을 막음
        this.integral = clamp(this.integral, -2, 2);

        const derivative = (error - this.prevError) / dt;
        this.prevError = error;

        const { kp, ki, kd } = this.getGain();

        let torque = kp * error + ki * this.integral + kd * derivative;
        torque = clamp(torque, -MAX_TORQUE, MAX_TORQUE);

        // 진자 운동 방정식
        // theta'' = -(g / L) sin(theta) - damping * omega + torque / (mL^2)
        const alpha =
          -(G / L) * Math.sin(this.theta)
          - damping * this.omega
          + torque / (M * L * L);

        this.omega += alpha * dt;
        this.theta += this.omega * dt;

        this.maxError = Math.max(this.maxError, Math.abs(this.theta));

        if (Math.abs(this.theta) < STABLE_THRESHOLD && Math.abs(this.omega) < 0.05) {
          this.stableCounter += dt;
          if (this.stableCounter > 1.0 && this.stableTime === null) {
            this.stableTime = simTime;
          }
        } else {
          this.stableCounter = 0;
        }

        this.history.push(this.theta * 180 / Math.PI);
        if (this.history.length > 700) {
          this.history.shift();
        }
      }

      disturb(strength) {
        const direction = Math.random() > 0.5 ? 1 : -1;
        this.omega += direction * strength;
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    const pendulums = [
      new Pendulum("무제어", "#94a3b8", "NONE"),
      new Pendulum("P 제어", "#f97316", "P"),
      new Pendulum("PD 제어", "#22d3ee", "PD"),
      new Pendulum("PID 제어", "#f472b6", "PID"),
    ];

    function resetAll() {
      simTime = 0;
      pendulums.forEach(p => p.reset());
    }

    function updateTextValues() {
      kpValue.textContent = kpSlider.value;
      kiValue.textContent = kiSlider.value;
      kdValue.textContent = kdSlider.value;
      angleValue.textContent = angleSlider.value + "°";
      dampingValue.textContent = dampingSlider.value;
      disturbValue.textContent = disturbSlider.value;
    }

    [kpSlider, kiSlider, kdSlider, angleSlider, dampingSlider, disturbSlider].forEach(slider => {
      slider.addEventListener("input", updateTextValues);
    });

    angleSlider.addEventListener("change", resetAll);

    pauseBtn.addEventListener("click", () => {
      paused = !paused;
      pauseBtn.textContent = paused ? "다시 실행" : "일시정지";
    });

    resetBtn.addEventListener("click", resetAll);

    disturbBtn.addEventListener("click", () => {
      const strength = Number(disturbSlider.value);
      pendulums.forEach(p => p.disturb(strength));
    });

    function drawPendulum(p, index, total) {
      const width = simCanvas.clientWidth;
      const height = simCanvas.clientHeight;

      const sectionWidth = width / total;
      const cx = sectionWidth * index + sectionWidth / 2;
      const cy = 120;
      const pixelLength = Math.min(220, height * 0.45);

      const bobX = cx + pixelLength * Math.sin(p.theta);
      const bobY = cy + pixelLength * Math.cos(p.theta);

      ctx.save();

      // 영역 카드
      ctx.fillStyle = "#111827";
      ctx.strokeStyle = "#273244";
      roundRect(ctx, cx - sectionWidth * 0.43, 35, sectionWidth * 0.86, height - 70, 18);
      ctx.fill();
      ctx.stroke();

      // 기준선
      ctx.strokeStyle = "rgba(255,255,255,0.15)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx, cy + pixelLength + 30);
      ctx.stroke();

      // 피벗
      ctx.fillStyle = "#e5e7eb";
      ctx.beginPath();
      ctx.arc(cx, cy, 7, 0, Math.PI * 2);
      ctx.fill();

      // 막대
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(bobX, bobY);
      ctx.stroke();

      // 추
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(bobX, bobY, 20, 0, Math.PI * 2);
      ctx.fill();

      // 추 하이라이트
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.beginPath();
      ctx.arc(bobX - 7, bobY - 7, 6, 0, Math.PI * 2);
      ctx.fill();

      const degree = p.theta * 180 / Math.PI;
      const stableText = p.stableTime === null ? "미도달" : p.stableTime.toFixed(2) + "초";
      const maxError = p.maxError * 180 / Math.PI;

      ctx.fillStyle = "#f8fafc";
      ctx.font = "bold 18px Arial";
      ctx.textAlign = "center";
      ctx.fillText(p.name, cx, height - 120);

      ctx.font = "13px Arial";
      ctx.fillStyle = "#cbd5e1";
      ctx.fillText(`현재 각도: ${degree.toFixed(2)}°`, cx, height - 92);
      ctx.fillText(`최대 오차: ${maxError.toFixed(2)}°`, cx, height - 70);
      ctx.fillText(`안정화 시간: ${stableText}`, cx, height - 48);

      if (p.stableTime !== null) {
        ctx.fillStyle = "#22c55e";
        ctx.fillText("안정화 성공", cx, height - 26);
      } else {
        ctx.fillStyle = "#facc15";
        ctx.fillText("안정화 진행 중", cx, height - 26);
      }

      ctx.restore();
    }

    function drawSimulation() {
      const width = simCanvas.clientWidth;
      const height = simCanvas.clientHeight;

      ctx.clearRect(0, 0, width, height);

      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, width, height);

      // 배경 격자
      ctx.strokeStyle = "rgba(255,255,255,0.04)";
      ctx.lineWidth = 1;

      for (let x = 0; x < width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }

      for (let y = 0; y < height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }

      pendulums.forEach((p, i) => drawPendulum(p, i, pendulums.length));

      ctx.fillStyle = "#e2e8f0";
      ctx.font = "14px Arial";
      ctx.textAlign = "left";
      ctx.fillText(`시뮬레이션 시간: ${simTime.toFixed(2)}초`, 20, 28);
    }

    function drawGraph() {
      const width = graphCanvas.clientWidth;
      const height = graphCanvas.clientHeight;

      gctx.clearRect(0, 0, width, height);
      gctx.fillStyle = "#111827";
      gctx.fillRect(0, 0, width, height);

      const padding = 42;
      const graphW = width - padding * 2;
      const graphH = height - padding * 2;
      const midY = padding + graphH / 2;

      // 제목
      gctx.fillStyle = "#f8fafc";
      gctx.font = "bold 15px Arial";
      gctx.textAlign = "left";
      gctx.fillText("각도 변화 그래프", 18, 24);

      // 축
      gctx.strokeStyle = "rgba(255,255,255,0.25)";
      gctx.lineWidth = 1;
      gctx.beginPath();
      gctx.moveTo(padding, padding);
      gctx.lineTo(padding, padding + graphH);
      gctx.lineTo(padding + graphW, padding + graphH);
      gctx.stroke();

      // 0도 기준선
      gctx.strokeStyle = "rgba(255,255,255,0.35)";
      gctx.beginPath();
      gctx.moveTo(padding, midY);
      gctx.lineTo(padding + graphW, midY);
      gctx.stroke();

      // 보조선
      gctx.strokeStyle = "rgba(255,255,255,0.08)";
      for (let i = -60; i <= 60; i += 20) {
        const y = midY - (i / 90) * (graphH / 2);
        gctx.beginPath();
        gctx.moveTo(padding, y);
        gctx.lineTo(padding + graphW, y);
        gctx.stroke();

        gctx.fillStyle = "#94a3b8";
        gctx.font = "11px Arial";
        gctx.textAlign = "right";
        gctx.fillText(i + "°", padding - 8, y + 4);
      }

      pendulums.forEach(p => {
        if (p.history.length < 2) return;

        gctx.strokeStyle = p.color;
        gctx.lineWidth = 2;
        gctx.beginPath();

        p.history.forEach((angle, i) => {
          const x = padding + (i / 700) * graphW;
          const y = midY - (angle / 90) * (graphH / 2);

          if (i === 0) gctx.moveTo(x, y);
          else gctx.lineTo(x, y);
        });

        gctx.stroke();
      });

      // 범례
      let lx = width - 360;
      let ly = 22;
      pendulums.forEach(p => {
        gctx.fillStyle = p.color;
        gctx.fillRect(lx, ly - 10, 12, 12);

        gctx.fillStyle = "#dbeafe";
        gctx.font = "12px Arial";
        gctx.textAlign = "left";
        gctx.fillText(p.name, lx + 18, ly);

        lx += 80;
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function loop(now) {
      const dtRaw = (now - lastTime) / 1000;
      lastTime = now;

      const dt = Math.min(dtRaw, 0.02);

      if (!paused) {
        simTime += dt;
        pendulums.forEach(p => p.update(dt));
      }

      drawSimulation();
      drawGraph();

      requestAnimationFrame(loop);
    }

    updateTextValues();
    resetAll();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
