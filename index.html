<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PID 로봇 안정화 게임</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, "Noto Sans KR", sans-serif;
      overflow: hidden;
    }

    header {
      height: 64px;
      padding: 12px 20px;
      background: #020617;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header span {
      color: #94a3b8;
      font-size: 13px;
    }

    .tabs {
      display: flex;
      gap: 8px;
    }

    .tab {
      width: auto;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid #475569;
      background: #1e293b;
      color: #cbd5e1;
      cursor: pointer;
      font-weight: bold;
    }

    .tab.active {
      background: #2563eb;
      color: white;
      border-color: #60a5fa;
    }

    .layout {
      height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 280px 1fr 300px;
    }

    .panel {
      background: #111827;
      border-right: 1px solid #334155;
      padding: 14px;
      overflow-y: auto;
    }

    .right {
      border-right: none;
      border-left: 1px solid #334155;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 13px;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 9px;
      font-size: 16px;
      color: #e0f2fe;
    }

    .card p {
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.45;
      color: #cbd5e1;
    }

    .mini-guide {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .guide {
      padding: 9px;
      border-radius: 10px;
      font-size: 13px;
      background: #0f172a;
      border: 1px solid #334155;
    }

    .guide b {
      display: inline-block;
      width: 24px;
      font-size: 15px;
    }

    .p { color: #fb923c; }
    .i { color: #f472b6; }
    .d { color: #38bdf8; }

    label {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .value {
      float: right;
      color: #86efac;
      font-weight: bold;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 7px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .green {
      background: #16a34a;
    }

    .green:hover {
      background: #15803d;
    }

    .red {
      background: #dc2626;
    }

    .red:hover {
      background: #b91c1c;
    }

    .purple {
      background: #7e22ce;
    }

    .purple:hover {
      background: #6b21a8;
    }

    .quest-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .quest-buttons button {
      margin: 0;
      font-size: 12px;
      background: #334155;
    }

    .quest-buttons button.active {
      background: #2563eb;
    }

    .stage {
      display: grid;
      grid-template-rows: 1fr 180px;
      background: #020617;
      min-width: 0;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #graph {
      border-top: 1px solid #334155;
      background: #111827;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
      padding: 7px 0;
      font-size: 13px;
      color: #cbd5e1;
    }

    .stat b {
      color: white;
    }

    .result {
      font-size: 15px;
      line-height: 1.45;
    }

    .success {
      color: #86efac;
      font-weight: bold;
    }

    .fail {
      color: #fca5a5;
      font-weight: bold;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      margin: 3px 2px;
      border-radius: 999px;
      background: #0f172a;
      border: 1px solid #334155;
      font-size: 12px;
      color: #cbd5e1;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1050px) {
      body {
        overflow: auto;
      }

      .layout {
        height: auto;
        grid-template-columns: 1fr;
      }

      .stage {
        height: 620px;
      }

      header {
        height: auto;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>PID 로봇 안정화 게임</h1>
      <span>넘어지는 로봇을 세우면서 PID 제어를 배우는 시뮬레이션</span>
    </div>

    <div class="tabs">
      <button class="tab active" id="questTab">퀘스트</button>
      <button class="tab" id="labTab">비교 실험</button>
    </div>
  </header>

  <main class="layout">
    <aside class="panel">
      <div class="card">
        <h2>조작</h2>

        <label>
          Kp 힘
          <span class="value" id="kpText">25</span>
        </label>
        <input id="kp" type="range" min="0" max="100" step="1" value="25" />

        <label>
          Ki 기억
          <span class="value" id="kiText">0</span>
        </label>
        <input id="ki" type="range" min="0" max="30" step="0.5" value="0" />

        <label>
          Kd 브레이크
          <span class="value" id="kdText">0</span>
        </label>
        <input id="kd" type="range" min="0" max="50" step="0.5" value="0" />
      </div>

      <div class="card">
        <h2>실행</h2>
        <button class="green" id="startBtn">시작</button>
        <button class="purple" id="pushBtn">외란 주기</button>
        <button class="red" id="resetBtn">초기화</button>
      </div>

      <div class="card">
        <h2>PID 한눈에 보기</h2>
        <div class="mini-guide">
          <div class="guide"><b class="p">P</b> 기울어진 만큼 반대로 민다</div>
          <div class="guide"><b class="d">D</b> 빠르게 흔들리면 브레이크</div>
          <div class="guide"><b class="i">I</b> 계속 남은 오차를 기억</div>
        </div>
      </div>
    </aside>

    <section class="stage">
      <canvas id="sim"></canvas>
      <canvas id="graph"></canvas>
    </section>

    <aside class="panel right">
      <div class="card" id="questCard">
        <h2>퀘스트</h2>
        <div class="quest-buttons">
          <button id="q0" class="active">1. P</button>
          <button id="q1">2. PD</button>
          <button id="q2">3. PID</button>
          <button id="q3">4. 외란</button>
        </div>
      </div>

      <div class="card">
        <h2 id="missionTitle">Quest 1. P 제어</h2>
        <p id="missionText">Kp만 조절해서 로봇을 세워보자.</p>
        <p id="missionTip">힌트: 너무 작으면 느리고, 너무 크면 흔들린다.</p>
      </div>

      <div class="card">
        <h2>상태</h2>
        <div class="stat"><span>각도</span><b id="angleStat">0°</b></div>
        <div class="stat"><span>최대 흔들림</span><b id="maxStat">0°</b></div>
        <div class="stat"><span>안정 유지</span><b id="stableStat">0초</b></div>
        <div class="stat"><span>남은 시간</span><b id="timeStat">0초</b></div>
        <div class="stat"><span>점수</span><b id="scoreStat">0</b></div>
      </div>

      <div class="card">
        <h2>결과</h2>
        <div class="result" id="resultText">시작 버튼을 눌러보자.</div>
      </div>

      <div class="card" id="labLegend">
        <h2>비교 실험 색상</h2>
        <span class="badge">회색 무제어</span>
        <span class="badge">주황 P</span>
        <span class="badge">하늘 PD</span>
        <span class="badge">분홍 PID</span>
      </div>
    </aside>
  </main>

  <script>
    const sim = document.getElementById("sim");
    const graph = document.getElementById("graph");
    const ctx = sim.getContext("2d");
    const gctx = graph.getContext("2d");

    const kp = document.getElementById("kp");
    const ki = document.getElementById("ki");
    const kd = document.getElementById("kd");

    const kpText = document.getElementById("kpText");
    const kiText = document.getElementById("kiText");
    const kdText = document.getElementById("kdText");

    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const pushBtn = document.getElementById("pushBtn");

    const questTab = document.getElementById("questTab");
    const labTab = document.getElementById("labTab");

    const missionTitle = document.getElementById("missionTitle");
    const missionText = document.getElementById("missionText");
    const missionTip = document.getElementById("missionTip");
    const resultText = document.getElementById("resultText");

    const angleStat = document.getElementById("angleStat");
    const maxStat = document.getElementById("maxStat");
    const stableStat = document.getElementById("stableStat");
    const timeStat = document.getElementById("timeStat");
    const scoreStat = document.getElementById("scoreStat");

    const qButtons = [
      document.getElementById("q0"),
      document.getElementById("q1"),
      document.getElementById("q2"),
      document.getElementById("q3")
    ];

    let mode = "quest";
    let running = false;
    let finished = false;
    let last = 0;
    let time = 0;
    let score = 0;
    let currentQuest = 0;

    const G = 9.81;
    const L = 1.4;
    const MASS = 1;
    const MAX_TORQUE = 35;

    const quests = [
      {
        title: "Quest 1. P 제어",
        text: "Kp만 조절해서 로봇을 세워보자.",
        tip: "힌트: Kp는 힘이다. 너무 작으면 느리고, 너무 크면 흔들린다.",
        kp: 25,
        ki: 0,
        kd: 0,
        allowI: false,
        allowD: false,
        angle: 25,
        limit: 18,
        hold: 2,
        wind: 0
      },
      {
        title: "Quest 2. PD 제어",
        text: "Kd를 사용해서 흔들림을 줄여보자.",
        tip: "힌트: Kd는 브레이크다. 흔들림이 클수록 Kd를 조금 올려보자.",
        kp: 35,
        ki: 0,
        kd: 10,
        allowI: false,
        allowD: true,
        angle: 30,
        limit: 18,
        hold: 2,
        wind: 0
      },
      {
        title: "Quest 3. PID 제어",
        text: "바람 때문에 남는 작은 오차까지 잡아보자.",
        tip: "힌트: Ki는 기억이다. 조금만 올리면 남은 오차를 줄일 수 있다.",
        kp: 35,
        ki: 3,
        kd: 12,
        allowI: true,
        allowD: true,
        angle: 20,
        limit: 22,
        hold: 2.5,
        wind: 0.35
      },
      {
        title: "Quest 4. 외란 버티기",
        text: "외부 충격을 받아도 다시 중심으로 돌아오게 해보자.",
        tip: "힌트: Kp는 빠른 복귀, Kd는 흔들림 감소, Ki는 조금만 사용.",
        kp: 40,
        ki: 2,
        kd: 15,
        allowI: true,
        allowD: true,
        angle: 35,
        limit: 25,
        hold: 3,
        wind: 0.2
      }
    ];

    function degToRad(d) {
      return d * Math.PI / 180;
    }

    function radToDeg(r) {
      return r * 180 / Math.PI;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    class Robot {
      constructor(name, color, type) {
        this.name = name;
        this.color = color;
        this.type = type;
        this.reset(25);
      }

      reset(angle) {
        this.theta = degToRad(angle);
        this.omega = 0;
        this.integral = 0;
        this.prevError = 0;
        this.history = [];
        this.maxError = Math.abs(this.theta);
        this.stable = 0;
        this.stableTime = null;
      }

      push(power) {
        const dir = Math.random() > 0.5 ? 1 : -1;
        this.omega += dir * power;
      }

      update(dt, gains, wind, now) {
        let error = -this.theta;
        this.integral += error * dt;
        this.integral = clamp(this.integral, -2.5, 2.5);

        let derivative = (error - this.prevError) / dt;
        this.prevError = error;

        let useKp = gains.kp;
        let useKi = gains.ki;
        let useKd = gains.kd;

        if (this.type === "NONE") {
          useKp = 0;
          useKi = 0;
          useKd = 0;
        }

        if (this.type === "P") {
          useKi = 0;
          useKd = 0;
        }

        if (this.type === "PD") {
          useKi = 0;
        }

        let torque = useKp * error + useKi * this.integral + useKd * derivative;
        torque = clamp(torque, -MAX_TORQUE, MAX_TORQUE);

        let alpha =
          -(G / L) * Math.sin(this.theta)
          - 0.1 * this.omega
          + torque / (MASS * L * L)
          + wind;

        this.omega += alpha * dt;
        this.theta += this.omega * dt;

        this.maxError = Math.max(this.maxError, Math.abs(this.theta));

        if (Math.abs(this.theta) < degToRad(2) && Math.abs(this.omega) < 0.06) {
          this.stable += dt;
          if (this.stable > 1 && this.stableTime === null) {
            this.stableTime = now;
          }
        } else {
          this.stable = 0;
        }

        this.history.push(radToDeg(this.theta));
        if (this.history.length > 500) {
          this.history.shift();
        }
      }
    }

    const questRobot = new Robot("로봇", "#60a5fa", "PID");

    const labRobots = [
      new Robot("무제어", "#94a3b8", "NONE"),
      new Robot("P", "#fb923c", "P"),
      new Robot("PD", "#38bdf8", "PD"),
      new Robot("PID", "#f472b6", "PID")
    ];

    function resize() {
      sim.width = sim.clientWidth;
      sim.height = sim.clientHeight;
      graph.width = graph.clientWidth;
      graph.height = graph.clientHeight;
    }

    window.addEventListener("resize", resize);

    function updateTexts() {
      kpText.textContent = kp.value;
      kiText.textContent = ki.value;
      kdText.textContent = kd.value;
    }

    [kp, ki, kd].forEach(input => {
      input.addEventListener("input", updateTexts);
    });

    function setQuest(index) {
      currentQuest = index;
      const q = quests[index];

      missionTitle.textContent = q.title;
      missionText.textContent = q.text;
      missionTip.textContent = q.tip;

      kp.value = q.kp;
      ki.value = q.ki;
      kd.value = q.kd;

      ki.disabled = !q.allowI;
      kd.disabled = !q.allowD;

      qButtons.forEach(btn => btn.classList.remove("active"));
      qButtons[index].classList.add("active");

      updateTexts();
      resetAll();
    }

    qButtons.forEach((btn, index) => {
      btn.addEventListener("click", () => setQuest(index));
    });

    questTab.addEventListener("click", () => {
      mode = "quest";
      questTab.classList.add("active");
      labTab.classList.remove("active");
      setQuest(currentQuest);
    });

    labTab.addEventListener("click", () => {
      mode = "lab";
      labTab.classList.add("active");
      questTab.classList.remove("active");
      ki.disabled = false;
      kd.disabled = false;
      resultText.innerHTML = "비교 실험 모드: 네 가지 제어 방식을 동시에 관찰한다.";
      resetAll();
    });

    startBtn.addEventListener("click", () => {
      running = true;
      finished = false;
      resultText.innerHTML = "진행 중...";
    });

    resetBtn.addEventListener("click", resetAll);

    pushBtn.addEventListener("click", () => {
      if (mode === "quest") {
        questRobot.push(4);
      } else {
        labRobots.forEach(r => r.push(3));
      }
    });

    function getGains() {
      return {
        kp: Number(kp.value),
        ki: Number(ki.value),
        kd: Number(kd.value)
      };
    }

    function resetAll() {
      running = false;
      finished = false;
      time = 0;
      score = 0;

      const q = quests[currentQuest];
      questRobot.reset(q.angle);

      labRobots.forEach(r => r.reset(q.angle));

      resultText.innerHTML = "시작 버튼을 눌러보자.";
      updateStats();
    }

    function update(dt) {
      if (!running || finished) return;

      time += dt;
      const gains = getGains();

      if (mode === "quest") {
        const q = quests[currentQuest];
        questRobot.update(dt, gains, q.wind, time);

        score = Math.round(
          1000
          - time * 15
          - radToDeg(questRobot.maxError) * 4
          + questRobot.stable * 100
        );
        score = Math.max(0, score);

        if (questRobot.stable >= q.hold) {
          finished = true;
          running = false;
          resultText.innerHTML =
            "<span class='success'>성공!</span><br>로봇이 안정화되었다.";
        }

        if (time >= q.limit) {
          finished = true;
          running = false;
          resultText.innerHTML =
            "<span class='fail'>실패!</span><br>값을 조절해서 다시 도전해보자.";
        }
      } else {
        labRobots.forEach(r => r.update(dt, gains, 0, time));
      }

      updateStats();
    }

    function updateStats() {
      const q = quests[currentQuest];
      const r = mode === "quest" ? questRobot : labRobots[3];

      angleStat.textContent = radToDeg(r.theta).toFixed(2) + "°";
      maxStat.textContent = radToDeg(r.maxError).toFixed(2) + "°";
      stableStat.textContent = r.stable.toFixed(2) + "초";
      timeStat.textContent = Math.max(0, q.limit - time).toFixed(1) + "초";
      scoreStat.textContent = score;
    }

    function drawGrid() {
      ctx.strokeStyle = "rgba(255,255,255,0.05)";
      ctx.lineWidth = 1;

      for (let x = 0; x < sim.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, sim.height);
        ctx.stroke();
      }

      for (let y = 0; y < sim.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(sim.width, y);
        ctx.stroke();
      }
    }

    function drawRobot(robot, x, y, size, label) {
      const topX = x + size * Math.sin(robot.theta);
      const topY = y - size * Math.cos(robot.theta);

      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x, y - size);
      ctx.stroke();

      ctx.strokeStyle = robot.color;
      ctx.lineWidth = 10;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(topX, topY);
      ctx.stroke();

      ctx.fillStyle = robot.color;
      ctx.beginPath();
      ctx.arc(x, y, 13, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.translate(topX, topY);
      ctx.rotate(robot.theta);
      ctx.fillStyle = robot.color;
      roundRect(ctx, -35, -35, 70, 70, 12);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.beginPath();
      ctx.arc(-13, -8, 5, 0, Math.PI * 2);
      ctx.arc(13, -8, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.fillStyle = "#e5e7eb";
      ctx.textAlign = "center";
      ctx.font = "bold 15px Arial";
      ctx.fillText(label, x, y + 34);

      ctx.font = "12px Arial";
      ctx.fillStyle = "#cbd5e1";
      ctx.fillText(radToDeg(robot.theta).toFixed(1) + "°", x, y + 54);
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawScene() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, sim.width, sim.height);
      drawGrid();

      ctx.strokeStyle = "#475569";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(0, sim.height * 0.78);
      ctx.lineTo(sim.width, sim.height * 0.78);
      ctx.stroke();

      if (mode === "quest") {
        drawRobot(
          questRobot,
          sim.width / 2,
          sim.height * 0.78,
          Math.min(230, sim.height * 0.45),
          "안정화 로봇"
        );

        ctx.fillStyle = "#e2e8f0";
        ctx.textAlign = "center";
        ctx.font = "bold 22px Arial";
        ctx.fillText(missionTitle.textContent, sim.width / 2, 40);

        if (quests[currentQuest].wind !== 0) {
          ctx.font = "14px Arial";
          ctx.fillStyle = "#93c5fd";
          ctx.fillText("바람이 계속 불고 있음", sim.width / 2, 65);
        }
      } else {
        const gap = sim.width / 5;
        labRobots.forEach((r, i) => {
          drawRobot(
            r,
            gap * (i + 1),
            sim.height * 0.78,
            Math.min(150, sim.height * 0.35),
            r.name
          );
        });

        ctx.fillStyle = "#e2e8f0";
        ctx.textAlign = "center";
        ctx.font = "bold 22px Arial";
        ctx.fillText("제어 방식 비교 실험", sim.width / 2, 40);
      }
    }

    function drawGraph() {
      gctx.fillStyle = "#111827";
      gctx.fillRect(0, 0, graph.width, graph.height);

      const pad = 35;
      const w = graph.width - pad * 2;
      const h = graph.height - pad * 2;
      const midY = pad + h / 2;

      gctx.strokeStyle = "#475569";
      gctx.lineWidth = 1;
      gctx.beginPath();
      gctx.moveTo(pad, pad);
      gctx.lineTo(pad, pad + h);
      gctx.lineTo(pad + w, pad + h);
      gctx.stroke();

      gctx.strokeStyle = "rgba(255,255,255,0.35)";
      gctx.beginPath();
      gctx.moveTo(pad, midY);
      gctx.lineTo(pad + w, midY);
      gctx.stroke();

      gctx.fillStyle = "#e5e7eb";
      gctx.font = "bold 14px Arial";
      gctx.textAlign = "left";
      gctx.fillText("각도 변화", 14, 22);

      const robots = mode === "quest" ? [questRobot] : labRobots;

      robots.forEach(robot => {
        if (robot.history.length < 2) return;

        gctx.strokeStyle = robot.color;
        gctx.lineWidth = 2;
        gctx.beginPath();

        robot.history.forEach((angle, i) => {
          const x = pad + (i / 500) * w;
          const y = midY - (angle / 90) * (h / 2);

          if (i === 0) gctx.moveTo(x, y);
          else gctx.lineTo(x, y);
        });

        gctx.stroke();
      });
    }

    function loop(timestamp) {
      if (!last) last = timestamp;
      let dt = (timestamp - last) / 1000;
      last = timestamp;
      dt = Math.min(dt, 0.03);

      update(dt);
      drawScene();
      drawGraph();

      requestAnimationFrame(loop);
    }

    resize();
    setQuest(0);
    updateTexts();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
