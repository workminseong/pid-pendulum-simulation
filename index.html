<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PID 제어 알고리즘에 따른 진자의 안정화 비교</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      background: #111827;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    header h1 {
      margin: 0;
      font-size: 26px;
    }

    header p {
      margin: 8px 0 0;
      color: #cbd5e1;
      font-size: 15px;
    }

    .container {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: calc(100vh - 90px);
    }

    .control-panel {
      padding: 20px;
      background: #1e293b;
      border-right: 1px solid #334155;
    }

    .control-box {
      margin-bottom: 18px;
      padding: 15px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
    }

    .control-box h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: #e0f2fe;
    }

    label {
      display: block;
      margin-top: 12px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 6px;
    }

    .value {
      color: #86efac;
      font-weight: bold;
      float: right;
    }

    button {
      width: 100%;
      padding: 11px;
      margin-top: 9px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .danger {
      background: #dc2626;
    }

    .danger:hover {
      background: #b91c1c;
    }

    .green {
      background: #16a34a;
    }

    .green:hover {
      background: #15803d;
    }

    .simulation {
      display: grid;
      grid-template-rows: 1fr 280px;
      height: calc(100vh - 90px);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #simCanvas {
      background: #020617;
    }

    #graphCanvas {
      background: #111827;
      border-top: 1px solid #334155;
    }

    .description {
      font-size: 13px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .legend {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.8;
    }

    .color-box {
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      border-radius: 50%;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .simulation {
        height: 750px;
      }

      .control-panel {
        border-right: none;
        border-bottom: 1px solid #334155;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>PID 제어 알고리즘에 따른 진자의 안정화 비교</h1>
    <p>무제어, P 제어, PD 제어, PID 제어 방식의 진자 안정화 성능을 비교하는 시뮬레이션</p>
  </header>

  <div class="container">
    <aside class="control-panel">
      <div class="control-box">
        <h2>PID 계수 설정</h2>

        <label>
          Kp 비례 제어
          <span class="value" id="kpText">35</span>
        </label>
        <input type="range" id="kp" min="0" max="100" step="1" value="35">

        <label>
          Ki 적분 제어
          <span class="value" id="kiText">4</span>
        </label>
        <input type="range" id="ki" min="0" max="30" step="0.5" value="4">

        <label>
          Kd 미분 제어
          <span class="value" id="kdText">12</span>
        </label>
        <input type="range" id="kd" min="0" max="50" step="0.5" value="12">
      </div>

      <div class="control-box">
        <h2>시뮬레이션 조건</h2>

        <label>
          초기 각도
          <span class="value" id="angleText">25°</span>
        </label>
        <input type="range" id="startAngle" min="-70" max="70" step="1" value="25">

        <label>
          마찰 / 감쇠
          <span class="value" id="dampingText">0.12</span>
        </label>
        <input type="range" id="damping" min="0" max="1" step="0.01" value="0.12">

        <label>
          외란 세기
          <span class="value" id="pushText">3.0</span>
        </label>
        <input type="range" id="pushPower" min="0" max="8" step="0.1" value="3">
      </div>

      <div class="control-box">
        <h2>실행 조작</h2>
        <button id="pauseBtn">일시정지</button>
        <button class="green" id="pushBtn">외란 주기</button>
        <button class="danger" id="resetBtn">초기화</button>
      </div>

      <div class="control-box description">
        <h2>색상 설명</h2>
        <div class="legend">
          <div><span class="color-box" style="background:#94a3b8;"></span>무제어</div>
          <div><span class="color-box" style="background:#fb923c;"></span>P 제어</div>
          <div><span class="color-box" style="background:#38bdf8;"></span>PD 제어</div>
          <div><span class="color-box" style="background:#f472b6;"></span>PID 제어</div>
        </div>
        <p>
          목표 각도는 0도이다. 각도가 빠르게 0도에 가까워지고 흔들림이 작을수록 안정화 성능이 좋다고 볼 수 있다.
        </p>
      </div>
    </aside>

    <main class="simulation">
      <canvas id="simCanvas"></canvas>
      <canvas id="graphCanvas"></canvas>
    </main>
  </div>

  <script>
    var simCanvas = document.getElementById("simCanvas");
    var graphCanvas = document.getElementById("graphCanvas");
    var ctx = simCanvas.getContext("2d");
    var gctx = graphCanvas.getContext("2d");

    var kpInput = document.getElementById("kp");
    var kiInput = document.getElementById("ki");
    var kdInput = document.getElementById("kd");
    var startAngleInput = document.getElementById("startAngle");
    var dampingInput = document.getElementById("damping");
    var pushPowerInput = document.getElementById("pushPower");

    var kpText = document.getElementById("kpText");
    var kiText = document.getElementById("kiText");
    var kdText = document.getElementById("kdText");
    var angleText = document.getElementById("angleText");
    var dampingText = document.getElementById("dampingText");
    var pushText = document.getElementById("pushText");

    var pauseBtn = document.getElementById("pauseBtn");
    var pushBtn = document.getElementById("pushBtn");
    var resetBtn = document.getElementById("resetBtn");

    var paused = false;
    var lastTime = 0;
    var time = 0;

    var gravity = 9.81;
    var length = 1.4;
    var mass = 1.0;
    var maxTorque = 35;

    function resizeCanvas() {
      simCanvas.width = simCanvas.clientWidth;
      simCanvas.height = simCanvas.clientHeight;
      graphCanvas.width = graphCanvas.clientWidth;
      graphCanvas.height = graphCanvas.clientHeight;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function degreeToRadian(deg) {
      return deg * Math.PI / 180;
    }

    function radianToDegree(rad) {
      return rad * 180 / Math.PI;
    }

    function limit(value, min, max) {
      if (value < min) return min;
      if (value > max) return max;
      return value;
    }

    function Pendulum(name, color, mode) {
      this.name = name;
      this.color = color;
      this.mode = mode;
      this.theta = 0;
      this.omega = 0;
      this.integral = 0;
      this.previousError = 0;
      this.history = [];
      this.maxError = 0;
      this.stableTime = null;
      this.stableCounter = 0;
      this.reset();
    }

    Pendulum.prototype.reset = function () {
      this.theta = degreeToRadian(Number(startAngleInput.value));
      this.omega = 0;
      this.integral = 0;
      this.previousError = 0;
      this.history = [];
      this.maxError = Math.abs(this.theta);
      this.stableTime = null;
      this.stableCounter = 0;
    };

    Pendulum.prototype.getPID = function () {
      var kp = Number(kpInput.value);
      var ki = Number(kiInput.value);
      var kd = Number(kdInput.value);

      if (this.mode === "NONE") {
        return { kp: 0, ki: 0, kd: 0 };
      }

      if (this.mode === "P") {
        return { kp: kp, ki: 0, kd: 0 };
      }

      if (this.mode === "PD") {
        return { kp: kp, ki: 0, kd: kd };
      }

      return { kp: kp, ki: ki, kd: kd };
    };

    Pendulum.prototype.update = function (dt) {
      var target = 0;
      var error = target - this.theta;

      this.integral += error * dt;
      this.integral = limit(this.integral, -2, 2);

      var derivative = (error - this.previousError) / dt;
      this.previousError = error;

      var pid = this.getPID();

      var torque =
        pid.kp * error +
        pid.ki * this.integral +
        pid.kd * derivative;

      torque = limit(torque, -maxTorque, maxTorque);

      var damping = Number(dampingInput.value);

      var angularAcceleration =
        -(gravity / length) * Math.sin(this.theta)
        - damping * this.omega
        + torque / (mass * length * length);

      this.omega += angularAcceleration * dt;
      this.theta += this.omega * dt;

      if (Math.abs(this.theta) > this.maxError) {
        this.maxError = Math.abs(this.theta);
      }

      if (Math.abs(this.theta) < degreeToRadian(2) && Math.abs(this.omega) < 0.05) {
        this.stableCounter += dt;
        if (this.stableCounter > 1.0 && this.stableTime === null) {
          this.stableTime = time;
        }
      } else {
        this.stableCounter = 0;
      }

      this.history.push(radianToDegree(this.theta));
      if (this.history.length > 600) {
        this.history.shift();
      }
    };

    Pendulum.prototype.push = function (power) {
      var direction = Math.random() > 0.5 ? 1 : -1;
      this.omega += direction * power;
    };

    var pendulums = [
      new Pendulum("무제어", "#94a3b8", "NONE"),
      new Pendulum("P 제어", "#fb923c", "P"),
      new Pendulum("PD 제어", "#38bdf8", "PD"),
      new Pendulum("PID 제어", "#f472b6", "PID")
    ];

    function updateLabels() {
      kpText.textContent = kpInput.value;
      kiText.textContent = kiInput.value;
      kdText.textContent = kdInput.value;
      angleText.textContent = startAngleInput.value + "°";
      dampingText.textContent = dampingInput.value;
      pushText.textContent = pushPowerInput.value;
    }

    kpInput.addEventListener("input", updateLabels);
    kiInput.addEventListener("input", updateLabels);
    kdInput.addEventListener("input", updateLabels);
    dampingInput.addEventListener("input", updateLabels);
    pushPowerInput.addEventListener("input", updateLabels);

    startAngleInput.addEventListener("input", function () {
      updateLabels();
    });

    startAngleInput.addEventListener("change", function () {
      resetSimulation();
    });

    pauseBtn.addEventListener("click", function () {
      paused = !paused;
      pauseBtn.textContent = paused ? "다시 실행" : "일시정지";
    });

    resetBtn.addEventListener("click", function () {
      resetSimulation();
    });

    pushBtn.addEventListener("click", function () {
      var power = Number(pushPowerInput.value);
      for (var i = 0; i < pendulums.length; i++) {
        pendulums[i].push(power);
      }
    });

    function resetSimulation() {
      time = 0;
      for (var i = 0; i < pendulums.length; i++) {
        pendulums[i].reset();
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, simCanvas.width, simCanvas.height);

      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;

      for (var x = 0; x < simCanvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, simCanvas.height);
        ctx.stroke();
      }

      for (var y = 0; y < simCanvas.height; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(simCanvas.width, y);
        ctx.stroke();
      }
    }

    function drawPendulum(p, index) {
      var count = pendulums.length;
      var areaWidth = simCanvas.width / count;
      var centerX = areaWidth * index + areaWidth / 2;
      var centerY = 95;
      var rodLength = Math.min(230, simCanvas.height * 0.45);

      var bobX = centerX + rodLength * Math.sin(p.theta);
      var bobY = centerY + rodLength * Math.cos(p.theta);

      var cardX = areaWidth * index + 12;
      var cardY = 25;
      var cardW = areaWidth - 24;
      var cardH = simCanvas.height - 50;

      ctx.fillStyle = "#0f172a";
      ctx.strokeStyle = "#334155";
      ctx.lineWidth = 1;
      ctx.fillRect(cardX, cardY, cardW, cardH);
      ctx.strokeRect(cardX, cardY, cardW, cardH);

      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX, centerY + rodLength + 20);
      ctx.stroke();

      ctx.strokeStyle = p.color;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(bobX, bobY);
      ctx.stroke();

      ctx.fillStyle = "#e5e7eb";
      ctx.beginPath();
      ctx.arc(centerX, centerY, 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(bobX, bobY, 20, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.beginPath();
      ctx.arc(bobX - 7, bobY - 7, 6, 0, Math.PI * 2);
      ctx.fill();

      var degree = radianToDegree(p.theta);
      var maxDegree = radianToDegree(p.maxError);
      var stableText = p.stableTime === null ? "미도달" : p.stableTime.toFixed(2) + "초";

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "bold 18px Arial";
      ctx.fillText(p.name, centerX, simCanvas.height - 125);

      ctx.font = "14px Arial";
      ctx.fillStyle = "#cbd5e1";
      ctx.fillText("현재 각도: " + degree.toFixed(2) + "°", centerX, simCanvas.height - 95);
      ctx.fillText("최대 오차: " + maxDegree.toFixed(2) + "°", centerX, simCanvas.height - 70);
      ctx.fillText("안정화 시간: " + stableText, centerX, simCanvas.height - 45);

      if (p.stableTime === null) {
        ctx.fillStyle = "#facc15";
        ctx.fillText("안정화 진행 중", centerX, simCanvas.height - 22);
      } else {
        ctx.fillStyle = "#4ade80";
        ctx.fillText("안정화 성공", centerX, simCanvas.height - 22);
      }
    }

    function drawSimulation() {
      drawBackground();

      for (var i = 0; i < pendulums.length; i++) {
        drawPendulum(pendulums[i], i);
      }

      ctx.fillStyle = "#e2e8f0";
      ctx.textAlign = "left";
      ctx.font = "14px Arial";
      ctx.fillText("시간: " + time.toFixed(2) + "초", 18, 22);
    }

    function drawGraph() {
      gctx.fillStyle = "#111827";
      gctx.fillRect(0, 0, graphCanvas.width, graphCanvas.height);

      var padding = 45;
      var w = graphCanvas.width - padding * 2;
      var h = graphCanvas.height - padding * 2;
      var midY = padding + h / 2;

      gctx.fillStyle = "#ffffff";
      gctx.textAlign = "left";
      gctx.font = "bold 16px Arial";
      gctx.fillText("각도 변화 그래프", 18, 25);

      gctx.strokeStyle = "#475569";
      gctx.lineWidth = 1;
      gctx.beginPath();
      gctx.moveTo(padding, padding);
      gctx.lineTo(padding, padding + h);
      gctx.lineTo(padding + w, padding + h);
      gctx.stroke();

      gctx.strokeStyle = "rgba(255,255,255,0.35)";
      gctx.beginPath();
      gctx.moveTo(padding, midY);
      gctx.lineTo(padding + w, midY);
      gctx.stroke();

      for (var angle = -60; angle <= 60; angle += 20) {
        var y = midY - angle / 90 * (h / 2);

        gctx.strokeStyle = "rgba(255,255,255,0.08)";
        gctx.beginPath();
        gctx.moveTo(padding, y);
        gctx.lineTo(padding + w, y);
        gctx.stroke();

        gctx.fillStyle = "#94a3b8";
        gctx.textAlign = "right";
        gctx.font = "11px Arial";
        gctx.fillText(angle + "°", padding - 8, y + 4);
      }

      for (var i = 0; i < pendulums.length; i++) {
        var p = pendulums[i];

        if (p.history.length < 2) {
          continue;
        }

        gctx.strokeStyle = p.color;
        gctx.lineWidth = 2;
        gctx.beginPath();

        for (var j = 0; j < p.history.length; j++) {
          var x = padding + j / 600 * w;
          var y = midY - p.history[j] / 90 * (h / 2);

          if (j === 0) {
            gctx.moveTo(x, y);
          } else {
            gctx.lineTo(x, y);
          }
        }

        gctx.stroke();
      }

      var legendX = graphCanvas.width - 330;
      var legendY = 25;

      for (var k = 0; k < pendulums.length; k++) {
        var pend = pendulums[k];

        gctx.fillStyle = pend.color;
        gctx.fillRect(legendX, legendY - 10, 12, 12);

        gctx.fillStyle = "#e5e7eb";
        gctx.textAlign = "left";
        gctx.font = "12px Arial";
        gctx.fillText(pend.name, legendX + 18, legendY);

        legendX += 78;
      }
    }

    function update(dt) {
      if (!paused) {
        time += dt;

        for (var i = 0; i < pendulums.length; i++) {
          pendulums[i].update(dt);
        }
      }
    }

    function loop(timestamp) {
      if (!lastTime) {
        lastTime = timestamp;
      }

      var dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      if (dt > 0.03) {
        dt = 0.03;
      }

      update(dt);
      drawSimulation();
      drawGraph();

      requestAnimationFrame(loop);
    }

    updateLabels();
    resetSimulation();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
